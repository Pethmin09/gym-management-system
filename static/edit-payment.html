<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>PowerPulse | Edit Record</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>

        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
        }
    </style>
</head>
<body class="bg-dark" style="background-color: #000 !important; color: #fff;">

<div class="container mt-5">
    <div class="card border-secondary mx-auto shadow-lg" style="max-width: 450px; background-color: #1a1d20; border-radius: 15px;">

        <div class="card-header border-secondary py-3" style="background-color: #1a1d20;">
            <h4 class="mb-0 text-primary fw-bold">Update Payment</h4>
        </div>

        <div class="card-body p-4">
            <p class="text-secondary small mb-4">Editing Record: <span class="text-white fw-bold" th:text="${payment.paymentId}"></span></p>

            <form th:action="@{/payments/update}" method="post">
                <input type="hidden" name="paymentId" th:value="${payment.paymentId}">

                <div class="mb-3">
                    <label class="form-label text-secondary small text-uppercase fw-bold">Member ID</label>
                    <input type="text" class="form-control bg-dark text-secondary border-secondary shadow-none"
                           th:value="${payment.memberId}" readonly style="border-style: dashed;">
                </div>

                <div class="mb-3">
                    <label class="form-label text-white-50 small text-uppercase fw-bold">Update Due Date</label>
                    <input type="date" name="dueDate" th:value="${payment.dueDate}"
                           class="form-control bg-dark text-white border-secondary shadow-none" required>
                </div>

                <div class="mb-4">
                    <label class="form-label text-white-50 small text-uppercase fw-bold">Update Paid Date</label>
                    <input type="date" name="paymentDate"
                           th:value="${payment.paymentDate != 'N/A' ? payment.paymentDate : ''}"
                           class="form-control bg-dark text-white border-secondary shadow-none">

                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary fw-bold py-2 shadow"
                            style="background-color: #007bff; border: none;">Save Changes</button>

                    <a th:href="@{/payments/history}" class="btn btn-link text-secondary text-decoration-none">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
