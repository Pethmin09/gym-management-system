<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>PowerPulse | Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">

    <style>
        body {
            background: #111;
            color: white;
            font-family: 'Segoe UI', sans-serif;
        }

        .navbar-custom {
            background: #181818;
            border-bottom: 2px solid #dc3545;
        }


        .card-custom {
            background: #1b1b1b;
            border: 1px solid #2a2a2a;
            border-radius: 18px;
            padding: 1.5rem;
        }
        /* Custom Dark Input Style */
.custom-dark-input {
    background-color: #1a1d20 !important; /* Gunmetal grey */
    border: 1px solid #333 !important;
    color: white !important;
    border-radius: 8px;
    height: 45px;
    transition: all 0.3s ease;
}

.custom-dark-input:focus {
    background-color: #25292d !important;
    border-color: #007bff !important;
    box-shadow: 0 0 10px rgba(0, 123, 255, 0.25) !important;
    outline: none;
}

/* Placeholder color for dark mode */
.custom-dark-input::placeholder {
    color: #6c757d;
    opacity: 0.8;
}

/* Link-style reset button */
.btn-link:hover {
    color: #007bff !important;
}

        .table-wrapper {
            max-height: 550px;
            overflow-y: auto;
            border-radius: 18px;
            margin-top: 10px;
        }

        .table-dark-custom {
            background: #181818;
            color: white;
        }

        .table-dark-custom thead {
            position: sticky;
            top: 0;
            background: #212529;
            color: #ff4d4d;
            z-index: 100;
        }

        .table-dark-custom tbody tr:hover {
            background: #252525;
            transition: 0.3s;
        }

        .btn-red {
            background: #dc3545;
            border: none;
        }

        .btn-red:hover {
            background: #bb2d3b;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark navbar-custom shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold text-danger" href="#">
            <i class="bi bi-lightning-charge-fill"></i> PowerPulse
        </a>

        <div class="ms-auto d-flex gap-2">
            <a th:href="@{/payments/history}" class="btn btn-outline-light btn-sm">
                <i class="bi bi-clock-history"></i> Records
            </a>

            <!--<a th:href="@{/payments/add}" class="btn btn-red btn-sm text-white">
                <i class="bi bi-plus-circle"></i> New Entry
            </a>-->
        </div>
    </div>
</nav>

<!-- MAIN CONTENT -->
<div class="container py-4" style="max-width: 1400px;">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">
            <i class="bi bi-speedometer2 text-danger"></i> Payment Dashboard
        </h2>

        <span class="badge bg-success p-2">
            <i class="bi bi-circle-fill"></i> Online
        </span>
    </div>
    <main class="col-md-10 p-4" style="background-color: #1a1a1a;">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold text-dark"></h3>
            <a th:href="@{/payments/add}" class="btn btn-primary shadow-sm">+ New Entry</a>
        </div>

    <!-- STATS -->
    <div class="row g-4 mb-4">

        <div class="col-md-6">
            <div class="card card-custom shadow border border-danger border-opacity-50">
                <h6 class="text-light opacity-75">
                    <i class="bi bi-database"></i> Total Transactions
                </h6>

                <h2 class="stat-number text-danger"
                    th:text="${paymentList.size()}">0</h2>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card card-custom shadow border border-success border-opacity-50">
                <h6 class="text-light opacity-75">
                    <i class="bi bi-wallet2"></i> Actual Revenue
                </h6>

                <h2 class="stat-number text-success">
                    LKR
                    <span th:text="${#aggregates.sum(paymentList.?[status == 'Paid'].![amount]) ?: '0.00'}"></span>
                </h2>
            </div>
        </div>



    </div>

    <!-- SEARCH -->
    <div class="search-container mb-4">
        <form th:action="@{/payments/search}" method="get" class="d-flex gap-2 mb-4" style="max-width: 450px;">
            <input type="text" name="memberId"
                   class="form-control bg-dark text-white border-secondary shadow-none"
                   placeholder="Search Member ID..." th:value="${searchQuery}">

            <button type="submit" class="btn btn-primary px-3">Search</button>

            <a th:href="@{/payments/history}" class="btn btn-link text-secondary text-decoration-none border-0">Reset</a>
        </form>
    </div>

    <div class="search-wrapper mb-4">
        <form th:action="@{/payments/search}" ...>
        </form>
    </div>

    <div class="rounded-3 border border-secondary overflow-hidden"
         style="max-height: 50vh; overflow-y: auto;">

        <table class="table table-dark table-hover align-middle m-0">
            <thead class="sticky-top bg-dark" style="z-index: 10;">
            </thead>
            <tbody>
            </tbody>
        </table>

    </div>

    <!-- TABLE -->
    <div class="card card-custom shadow">
        <div class="table-wrapper">
            <table class="table table-dark table-hover align-middle table-dark-custom mb-0">

                <thead>
                <tr>
                    <th>ID</th>
                    <th>Member</th>
                    <th>Amount</th>
                    <th>Due Date</th>
                    <th>Paid On</th>
                    <th>Status</th>
                    <th class="text-end">Action</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="p : ${paymentList}">

                    <td th:text="${p.paymentId}"></td>
                    <td th:text="${p.memberId}"></td>
                    <td th:text="'LKR. ' + ${p.amount}"></td>
                    <td th:text="${p.dueDate}"></td>
                    <td th:text="${p.paymentDate != 'N/A' ? p.paymentDate : '---'}"></td>

                    <td>
                        <span th:if="${p.status == 'Paid'}" class="badge bg-success">Paid</span>
                        <span th:if="${p.status == 'Pending'}" class="badge bg-warning text-dark">Pending</span>
                        <span th:if="${p.status == 'Overdue'}" class="badge bg-danger">Overdue</span>
                    </td>

                    <td class="text-end">

                        <a th:href="@{/payments/edit/{id}(id=${p.paymentId})}"
                           class="btn btn-sm btn-outline-warning">
                            <i class="bi bi-pencil-square"></i>
                        </a>

                        <a th:href="@{/payments/billing/{id}(id=${p.paymentId})}"
                           class="btn btn-sm btn-outline-info">
                            <i class="bi bi-file-earmark-text"></i>
                        </a>

                        <a th:href="@{/payments/delete/{id}(id=${p.paymentId})}"
                           class="btn btn-sm btn-outline-danger"
                           onclick="return confirm('Are you sure you want to delete this record?')">
                            <i class="bi bi-trash"></i>
                        </a>

                    </td>
                </tr>
                </tbody>

            </table>
        </div>
    </div>
    </main>>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</div>
</body>
</html>
