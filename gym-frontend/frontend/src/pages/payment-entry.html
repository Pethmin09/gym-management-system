<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>PowerPulse | Entry</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <style>
        /* Updated to match Dashboard and React pages */
        body { background-color: #0f1113; color: #ffffff; font-family: 'Inter', sans-serif; }

        .sidebar { height: 100vh; background: #1a1d20; position: fixed; width: 250px; border-right: 1px solid #333; }

        .main-content { margin-left: 250px; padding: 60px; display: flex; justify-content: center; }

        /* Card now matches the Dashboard style */
        .form-container {
            width: 100%;
            max-width: 550px;
            background-color: #1a1d20;
            border: 1px solid #333;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Form Inputs updated for Dark Mode visibility */
        .form-control, .form-select {
            background-color: #25282c;
            border: 1px solid #444;
            color: #ffffff;
        }

        .form-control:focus, .form-select:focus {
            background-color: #2c3035;
            border-color: #007bff;
            color: #ffffff;
            box-shadow: none;
        }

        .form-control::placeholder { color: #777; }

        .btn-action { background-color: #007bff; color: white; border: none; padding: 12px; font-weight: bold; }
        .btn-action:hover { background-color: #0056b3; color: white; }

        /* Label color lightened for contrast against dark background */
        .form-label { font-size: 0.8rem; letter-spacing: 1px; color: #aaaaaa; font-weight: 700; }

        .btn-cancel { background-color: transparent; color: #ffffff; border: 1px solid #444; }
        .btn-cancel:hover { background-color: #333; color: #ffffff; }
    </style>
</head>
<body>



<div class="main-content">
    <div class="form-container">
        <h2 class="fw-bold mb-4">Add Payment</h2>
        <form th:action="@{/payments/save}" method="post">
            <div class="mb-3">
                <label class="form-label text-uppercase">Member Identification</label>
                <input type="text" name="memberId" class="form-control" placeholder="MEM-XXX" required>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Amount (LKR)</label>
                    <input type="number" name="amount" class="form-control" min="1" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Due Date</label>
                    <input type="date" name="dueDate" class="form-control" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Paid On</label>
                    <input type="date" name="paymentDate" class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label">Payment Category</label>
                    <select name="type" id="paymentType" class="form-select" onchange="togglePaymentFields()" required>
                        <option value="CASH">Cash / Physical</option>
                        <option value="CARD">Card / Online</option>
                    </select>
                </div>

                <div class="mb-3" id="extraFieldContainer">
                    <label id="extraFieldLabel" class="form-label" >Amount Received (LKR)</label>
                    <input type="text" name="extraField" id="extraFieldInput" class="form-control" placeholder="Enter amount" >
                </div>

                <script>
                    function togglePaymentFields() {
                        const type = document.getElementById("paymentType").value;
                        const label = document.getElementById("extraFieldLabel");
                        const input = document.getElementById("extraFieldInput");

                        if (type === "CARD") {
                            label.innerText = "Reference Note / Transaction ID";
                            input.placeholder = "e.g. TXN992831";
                            input.type = "text";
                        } else {
                            label.innerText = "Amount Received (LKR)";
                            input.placeholder = "e.g. 5000";
                            input.type = "number";
                        }
                    }
                </script>
                <button type="submit" class="btn btn-action w-100 mb-2">Process Record</button>
                <a href="/payments/history" class="btn btn-light w-100 border">Cancel</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
