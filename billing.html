<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Billing</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        body {
            background: #0d0d0d;
            color: white;
        }

        .invoice-card {
            background: #1a1d20;
            border: 1px solid #2b2b2b;
            border-radius: 16px;
            overflow: hidden;
        }

        .invoice-header {
            background: #111;
            border-bottom: 2px solid #dc3545;
            padding: 25px;
            text-align: center;
        }

        .label {
            color: #aaa;
            font-size: 12px;
            text-transform: uppercase;
        }

        .value {
            font-weight: 600;
        }

        .row-item {
            padding: 14px 0;
            border-bottom: 1px solid #2b2b2b;
        }

        .btn-red {
            background: #dc3545;
            color: white;
        }

        .btn-red:hover {
            background: #bb2d3b;
        }

        @media print {
            .no-print { display: none; }
            body { background: white; color: black; }
            .invoice-card { border: none; }
        }
    </style>
</head>

<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8 col-12">


            <div class="invoice-card shadow">



                <div class="invoice-header">
                    <h2 class="text-danger fw-bold mb-2">
                        <i class="bi bi-lightning-charge-fill"></i> Receipt
                    </h2>

                    <p class="text-light opacity-75 small mb-0 text-uppercase fw-semibold">
                        Payment Receipt
                    </p>
                </div>

                <!-- BODY -->
                <div class="p-4">

                    <div class="row row-item">
                        <div class="col-6 label">Payment ID</div>
                        <div class="col-6 text-end value"
                             th:text="${payment.paymentId}">
                        </div>
                    </div>


                    <div class="row row-item">
                        <div class="col-6 label">Member ID</div>
                        <div class="col-6 text-end value text-info"
                             th:text="${payment.memberId}">
                        </div>
                    </div>


                    <div class="row row-item">
                        <div class="col-6 label">Amount</div>
                        <div class="col-6 text-end value text-success"
                             th:text="'Rs. ' + ${payment.amount}">
                        </div>
                    </div>


                    <div class="row row-item"
                         th:if="${payment.paymentType != null and payment.paymentType.toUpperCase() == 'CASH'}">

                        <div class="col-6 label">Cash Received</div>
                        <div class="col-6 text-end value"
                             th:text="'Rs. ' + ${payment.amountReceived}">
                        </div>
                    </div>


                    <div class="row row-item"
                         th:if="${payment.paymentType != null and payment.paymentType.toUpperCase() == 'CARD'}">

                        <div class="col-6 label">Transaction ID</div>
                        <div class="col-6 text-end value font-monospace"
                             th:text="${payment.transactionRef}">
                        </div>
                    </div>


                    <div class="row row-item">
                        <div class="col-6 label">Due Date</div>
                        <div class="col-6 text-end value"
                             th:text="${payment.dueDate}">
                        </div>
                    </div>


                    <div class="row row-item">
                        <div class="col-6 label">Paid Date</div>
                        <div class="col-6 text-end value text-success"
                             th:text="${payment.paymentDate}">
                        </div>
                    </div>


                    <div class="row row-item">
                        <div class="col-6 label">Status</div>

                        <div class="col-6 text-end">

        <span class="badge"
              th:classappend="
                ${payment.status == 'Paid'} ? 'bg-success' :
                (${payment.status == 'Pending'} ? 'bg-warning text-dark' :
                'bg-danger')"

              th:text="${payment.status}">
        </span>

                        </div>
                    </div>


                    <div class="row row-item">
                        <div class="col-6 label">Method</div>
                        <div class="col-6 text-end">
                            <span class="badge bg-dark border"
                                  th:text="${payment.paymentType}">
                            </span>
                        </div>
                    </div>

                </div>

                <div class="p-3 text-center no-print border-top border-secondary">

                    <button class="btn btn-primary me-2" onclick="window.print()">
                        <i class="bi bi-printer"></i> Print
                    </button>

                    <a th:href="@{/payments/history}" class="btn btn-outline-light">
                        <i class="bi bi-arrow-left"></i> Back
                    </a>

                </div>

            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
